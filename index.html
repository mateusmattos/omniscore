<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniScore — Diagnóstico Omnichannel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.shell{max-width:620px;margin:0 auto;padding:2.5rem 1.25rem 5rem}
.logo{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#185fa5;text-align:center;margin-bottom:2rem}
.prog-wrap{margin-bottom:2.5rem}
.prog-track{height:3px;background:#e5e5e2;border-radius:2px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:#185fa5;border-radius:2px;transition:width .4s ease}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:#bbb}
.card{background:#fff;border:1px solid #e8e8e5;border-radius:16px;padding:2rem;margin-bottom:1rem}
.cad-titulo{font-size:18px;font-weight:600;margin-bottom:.35rem}
.cad-sub{font-size:13px;color:#999;margin-bottom:1.5rem;line-height:1.5}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.fg.un{grid-template-columns:1fr}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:12px;font-weight:500;color:#666}
.fl input{padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;outline:none;transition:border-color .15s;background:#fff}
.fl input:focus{border-color:#185fa5}
.fl input::placeholder{color:#ccc}
.nav-row{display:flex;align-items:center;justify-content:flex-end;margin-top:1rem}
.q-wrap{display:none}
.q-wrap.ativa{display:block}
.q-dim{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#185fa5;margin-bottom:.9rem}
.q-texto{font-size:19px;font-weight:500;color:#1a1a1a;line-height:1.4;margin-bottom:1.75rem}
.opcoes{display:flex;flex-direction:column;gap:9px}
.opcao{display:flex;align-items:flex-start;gap:13px;padding:13px 15px;border:1px solid #e8e8e5;border-radius:10px;cursor:pointer;transition:all .15s;font-size:14px;color:#444;line-height:1.45;user-select:none}
.opcao:hover{border-color:#b5d4f4;background:#f7fbff}
.opcao.sel{border-color:#378add;background:#e6f1fb;color:#0c447c}
.opcao-letra{min-width:22px;height:22px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#bbb;flex-shrink:0;margin-top:1px;transition:all .15s}
.opcao.sel .opcao-letra{background:#185fa5;border-color:#185fa5;color:#fff}
.q-nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem}
.q-hint{font-size:12px;color:#ccc}
.btn{padding:10px 22px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover:not(:disabled){background:#f5f5f3}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{background:#185fa5;color:#fff;border-color:#185fa5}
.btn-p:hover:not(:disabled){background:#0c447c}
.resultado{display:none}
.score-hero{text-align:center;padding:2.5rem 2rem;background:#fff;border:1px solid #e8e8e5;border-radius:16px;margin-bottom:10px}
.score-rotulo{font-size:12px;color:#bbb;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem}
.score-num{font-size:68px;font-weight:700;line-height:1;margin-bottom:.35rem}
.score-nivel{font-size:16px;font-weight:600;margin-bottom:.75rem}
.score-desc{font-size:14px;color:#777;line-height:1.65;max-width:440px;margin:0 auto}
.dims-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}
.dim-card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:.9rem .75rem;text-align:center}
.dim-card-nome{font-size:10px;color:#aaa;margin-bottom:5px;line-height:1.3;min-height:26px;display:flex;align-items:center;justify-content:center}
.dim-card-val{font-size:22px;font-weight:600;color:#1a1a1a}
.insights{background:#fff;border:1px solid #e8e8e5;border-radius:16px;padding:1.5rem 2rem;margin-bottom:10px}
.insights h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.ins-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0ee;font-size:13px;line-height:1.6;color:#555}
.ins-item:last-child{border-bottom:none;padding-bottom:0}
.ins-ic{font-size:14px;font-weight:700;flex-shrink:0;width:18px;margin-top:1px}
.obrigado{background:#f7fbff;border:1px solid #b5d4f4;border-radius:16px;padding:1.5rem 2rem;text-align:center}
.obrigado h3{font-size:15px;font-weight:600;color:#0c447c;margin-bottom:.5rem}
.obrigado p{font-size:13px;color:#185fa5;line-height:1.65}
.enviando{text-align:center;font-size:13px;color:#bbb;padding:1.5rem 0;display:none}
@media(max-width:520px){
  .fg{grid-template-columns:1fr}
  .dims-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .q-texto{font-size:16px}
  .score-num{font-size:54px}
  .card{padding:1.5rem}
}
</style>
</head>
<body>
<div class="shell">
  <div class="logo">OmniScore</div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-meta"><span id="progLabel">Identificação</span><span id="progPct"></span></div>
  </div>

  <!-- CADASTRO -->
  <div id="stepCad">
    <div class="card">
      <div class="cad-titulo">Antes de começar, se identifique</div>
      <div class="cad-sub">Seus dados ficam só com a gente. Nenhum spam.</div>
      <div class="fg">
        <div class="fl"><label>Nome completo</label><input id="f-nome" type="text" placeholder="Seu nome"></div>
        <div class="fl"><label>E-mail</label><input id="f-email" type="email" placeholder="voce@empresa.com"></div>
      </div>
      <div class="fg">
        <div class="fl"><label>WhatsApp</label><input id="f-whatsapp" type="tel" placeholder="(51) 99999-9999"></div>
        <div class="fl"><label>Empresa</label><input id="f-empresa" type="text" placeholder="Nome da empresa"></div>
      </div>
      <div class="fg un">
        <div class="fl"><label>Cargo / área</label><input id="f-cargo" type="text" placeholder="Ex: Gerente de E-commerce"></div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn-p" onclick="iniciar()">Começar o diagnóstico →</button>
    </div>
  </div>

  <!-- PERGUNTAS -->
  <div id="stepQ" style="display:none">
    <div id="qWrap"></div>
    <div class="q-nav">
      <button class="btn" id="btnV" onclick="nav(-1)" disabled>← Voltar</button>
      <span class="q-hint" id="qHint"></span>
      <button class="btn btn-p" id="btnA" onclick="nav(1)" disabled>Próxima →</button>
    </div>
  </div>

  <!-- RESULTADO -->
  <div class="resultado" id="stepRes">
    <div class="enviando" id="enviando">Calculando seu resultado...</div>
    <div id="resConteudo"></div>
  </div>
</div>

<script>
const WEBHOOK='https://script.google.com/macros/s/AKfycbyb0mEFo3KPO2YlIdivVVDAyPfZXTkosLb8PCdw6sGFy0VgnAtbNjfyArMNonveB6Wy1Q/exec';

const QS=[
  {dim:'Dados e tecnologia',
   texto:'Como os dados do cliente são unificados entre os canais da sua empresa?',
   opcoes:['Cada canal tem sua própria base — não se comunicam','Há integração, mas é manual ou parcial e gera inconsistências','Sistema centralizado funcionando, mas ainda com gaps relevantes','Visão única do cliente em tempo real em todos os canais']},
  {dim:'Dados e tecnologia',
   texto:'Como é a integração entre os sistemas principais da operação — ERP, e-commerce e PDV das lojas?',
   opcoes:['Sistemas isolados, cada um opera de forma independente','Integração existe, mas depende de processos manuais frequentes','Integração via API, mas com falhas e ajustes recorrentes','Integração estável e confiável entre todos os sistemas críticos']},
  {dim:'Dados e tecnologia',
   texto:'A empresa usa dados de comportamento do cliente para personalizar comunicação e ofertas?',
   opcoes:['Não usamos dados para personalização','Segmentação básica por e-mail, sem dados de loja física','Personalização no digital, sem considerar o comportamento offline','Personalização ativa em todos os canais com base em histórico unificado']},
  {dim:'Dados e tecnologia',
   texto:'Existem dashboards que mostram o desempenho omnichannel de forma integrada para a gestão?',
   opcoes:['Não há acompanhamento estruturado — usamos relatórios avulsos','Relatórios manuais em planilhas, sem periodicidade fixa','Dashboard parcial, cobre alguns canais ou métricas mas não todos','BI consolidado com todos os canais, atualização automática e uso gerencial']},
  {dim:'Jornada do cliente',
   texto:'O cliente consegue transitar entre canais sem perder contexto — iniciar no digital e resolver na loja, por exemplo?',
   opcoes:['Não — cada canal é uma experiência completamente separada','Em alguns fluxos específicos, mas não é a regra geral','Na maioria das jornadas, mas ainda com pontos de fricção','Sim — a experiência é fluida em qualquer canal que o cliente escolha']},
  {dim:'Jornada do cliente',
   texto:'Como funciona troca ou devolução para quem comprou em um canal e quer resolver em outro?',
   opcoes:['Não é possível — troca só acontece no mesmo canal da compra','É possível, mas o processo é burocrático e gera atrito','Funciona, mas depende de consulta manual ao histórico','Processo fluido — cliente resolve em qualquer canal sem esforço']},
  {dim:'Jornada do cliente',
   texto:'O programa de fidelidade ou benefícios da empresa funciona de forma unificada entre canais?',
   opcoes:['Não há programa de fidelidade','Existe, mas pontos e benefícios são separados por canal','Acúmulo unificado, mas resgate restrito a um canal','Acúmulo e resgate integrados em qualquer canal']},
  {dim:'Jornada do cliente',
   texto:'Quando um cliente aciona o atendimento, o agente tem acesso ao histórico completo em todos os canais?',
   opcoes:['Cada canal vê apenas o histórico do próprio canal','Histórico parcial disponível, mas com lacunas relevantes','Histórico digital disponível, mas compras na loja física não aparecem','Histórico completo e acessível em qualquer ponto de atendimento']},
  {dim:'Logística e estoque',
   texto:'O que o sistema mostra de estoque bate com o que está disponível na prática entre os canais?',
   opcoes:['Cada canal tem estoque separado — não há visibilidade cruzada','Há visibilidade, mas com defasagem — os dados frequentemente não batem','Visibilidade razoável, com exceções e ajustes pontuais','Estoque unificado e confiável em tempo real em todos os canais']},
  {dim:'Logística e estoque',
   texto:'As lojas físicas participam ativamente da operação online — Ship from Store, Click & Collect ou similares?',
   opcoes:['Não — loja física e e-commerce operam de forma completamente separada','Estamos avaliando ou em fase piloto inicial','Operando em algumas lojas, sem escala para toda a rede','Lojas integradas à operação digital com processos definidos e estáveis']},
  {dim:'Logística e estoque',
   texto:'Como é tratada a logística reversa — devoluções e trocas que envolvem mais de um canal?',
   opcoes:['Processo manual, sem rastreamento adequado','Processo definido, mas com muito retrabalho operacional','Estruturado, mas sem integração automática com o estoque','Integrada — devolução reabastece o estoque disponível automaticamente']},
  {dim:'Logística e estoque',
   texto:'Existem SLAs definidos e acompanhados para as modalidades de entrega omnichannel?',
   opcoes:['Não há SLAs definidos para modalidades omnichannel','SLAs informais, sem monitoramento sistemático','SLAs definidos, mas monitorados manualmente com gaps','SLAs monitorados com alertas automáticos de desvio']},
  {dim:'Cultura e times',
   texto:'Existe alguém com responsabilidade clara e dedicada pela estratégia omnichannel na empresa?',
   opcoes:['Não — responsabilidade diluída entre áreas sem coordenação','Existe um responsável, mas sem equipe, orçamento ou autonomia real','Há uma área dedicada, ainda em estruturação','Time com liderança clara, orçamento e OKRs próprios']},
  {dim:'Cultura e times',
   texto:'Os times de loja física têm incentivo para apoiar as vendas digitais, ou existe conflito interno?',
   opcoes:['Conflito claro — a loja sente que o digital compete com ela','Não há conflito direto, mas também não há colaboração real','Estamos testando modelos de comissionamento compartilhado','Modelo unificado funcionando — loja e digital trabalham para o mesmo resultado']},
  {dim:'Cultura e times',
   texto:'Existe um processo formal de gestão e priorização de projetos omnichannel — backlog, responsáveis e critério de conclusão?',
   opcoes:['Projetos surgem de forma ad hoc, sem metodologia','Processo informal, sem backlog ou priorização estruturada','Metodologia ágil em uso, mas desconectada das metas de negócio','Backlog priorizado, owners definidos, sprint reviews e OKRs conectados']},
  {dim:'Cultura e times',
   texto:'O omnichannel está na agenda estratégica da liderança sênior, com revisão periódica e recursos alocados?',
   opcoes:['Não está na agenda da liderança','Reconhecido como importante, mas sem recursos alocados','Na agenda com recursos, mas sem revisão periódica de resultados','Pauta de revisão estratégica com OKRs monitorados pelo C-level']},
  {dim:'Experiência do cliente',
   texto:'Como você avalia a consistência da experiência do cliente ao interagir com a marca em canais diferentes?',
   opcoes:['Muito inconsistente — preço, informação e atendimento variam bastante','Inconsistências relevantes que geram reclamações recorrentes','Razoavelmente consistente, com pontos de melhoria já identificados','Experiência reconhecidamente consistente em todos os canais']},
  {dim:'Experiência do cliente',
   texto:'A empresa monitora e age sobre o que os clientes dizem sobre a experiência omnichannel — reclamações, avaliações, NPS?',
   opcoes:['Não monitoramos de forma sistemática','Monitoramos, mas a resposta é reativa e sem análise de causa raiz','Monitoramento ativo com respostas, mas sem melhoria estruturada de processos','Ciclo completo: monitoramento, causa raiz, ação corretiva e acompanhamento']},
  {dim:'Performance e resultados',
   texto:'A empresa acompanha indicadores específicos de omnichannel além do faturamento por canal?',
   opcoes:['Não — só acompanhamos receita por canal','Alguns KPIs básicos, mas sem visão consolidada','Dashboard com métricas omnichannel, mas cobertura parcial','Visão completa: penetração omni, NPS por canal, custo de servir, LTV cross-canal']},
  {dim:'Performance e resultados',
   texto:'Os resultados das iniciativas omnichannel chegam à liderança com frequência e formato estruturado?',
   opcoes:['Não chegam — não há reporte formal para a liderança','Chegam esporadicamente, sem formato ou frequência definida','Revisão mensal existe, mas sem estrutura para tomada de decisão','Revisão regular com apresentação estruturada e decisões orientadas por dados']}
];

const DIMS=[
  {id:'dados',      label:'Dados e tecnologia',    qs:[0,1,2,3],    peso:20},
  {id:'jornada',    label:'Jornada do cliente',    qs:[4,5,6,7],    peso:20},
  {id:'logistica',  label:'Logística e estoque',   qs:[8,9,10,11],  peso:20},
  {id:'cultura',    label:'Cultura e times',       qs:[12,13,14,15],peso:20},
  {id:'cx',         label:'Experiência do cliente',qs:[16,17],      peso:10},
  {id:'performance',label:'Performance',           qs:[18,19],      peso:10}
];

const NIVEIS=[
  {min:0, max:25,label:'Nível 0 — Fragmentado',       cor:'#e24b4a',desc:'A operação ainda funciona em silos. Cada canal é uma ilha — sem integração de dados, processos ou experiência consistente para o cliente.'},
  {min:25,max:50,label:'Nível 1 — Iniciante',          cor:'#ef9f27',desc:'Há consciência do problema e algumas iniciativas em andamento, mas faltam consistência, governança e integração entre as dimensões.'},
  {min:50,max:70,label:'Nível 2 — Em desenvolvimento', cor:'#ba7517',desc:'A empresa está no caminho certo. Existem integrações relevantes, mas com gaps importantes de escala, dados e cultura.'},
  {min:70,max:88,label:'Nível 3 — Avançado',           cor:'#3b6d11',desc:'Operação omnichannel madura. A maioria dos canais funciona de forma integrada. O foco agora é otimização e eliminação dos últimos pontos de fricção.'},
  {min:88,max:101,label:'Nível 4 — Referência',        cor:'#27500a',desc:'Excelência operacional. Visão unificada do cliente, dados em tempo real e cultura de melhoria contínua consolidada. Benchmark do setor.'}
];

let cur=0;
const ans={};
let cad={};

function atualizarProg(i){
  const p=Math.round((i+1)/(QS.length+1)*100);
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progPct').textContent=p+'%';
  document.getElementById('progLabel').textContent=i<0?'Identificação':QS[i].dim+' · '+(i+1)+' de '+QS.length;
}

function iniciar(){
  const nome=document.getElementById('f-nome').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const empresa=document.getElementById('f-empresa').value.trim();
  const cargo=document.getElementById('f-cargo').value.trim();
  if(!nome||!email||!empresa||!cargo){alert('Preencha todos os campos para continuar.');return;}
  cad={nome,email,whatsapp:document.getElementById('f-whatsapp').value.trim(),empresa,cargo};
  document.getElementById('stepCad').style.display='none';
  document.getElementById('stepQ').style.display='block';
  renderPerguntas();
  irPara(0);
}

function renderPerguntas(){
  document.getElementById('qWrap').innerHTML=QS.map((q,i)=>`
    <div class="q-wrap${i===0?' ativa':''}" id="q${i}">
      <div class="card">
        <div class="q-dim">${q.dim}</div>
        <div class="q-texto">${q.texto}</div>
        <div class="opcoes">
          ${q.opcoes.map((o,oi)=>`
            <div class="opcao${ans[i]===oi?' sel':''}" id="op${i}-${oi}" onclick="selecionar(${i},${oi})">
              <div class="opcao-letra">${['A','B','C','D'][oi]}</div>
              <span>${o}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function selecionar(qi,oi){
  ans[qi]=oi;
  document.querySelectorAll('#q'+qi+' .opcao').forEach(el=>el.classList.remove('sel'));
  document.getElementById('op'+qi+'-'+oi).classList.add('sel');
  document.getElementById('btnA').disabled=false;
  const isLast=qi===QS.length-1;
  setTimeout(()=>{isLast?mostrarResultado():nav(1);},350);
}

function irPara(i){
  document.querySelectorAll('.q-wrap').forEach(el=>el.classList.remove('ativa'));
  document.getElementById('q'+i).classList.add('ativa');
  cur=i;
  document.getElementById('btnV').disabled=i===0;
  document.getElementById('btnA').disabled=ans[i]===undefined;
  const isLast=i===QS.length-1;
  document.getElementById('btnA').textContent=isLast?'Ver resultado →':'Próxima →';
  document.getElementById('btnA').onclick=isLast?mostrarResultado:()=>nav(1);
  document.getElementById('qHint').textContent=(i+1)+' de '+QS.length;
  atualizarProg(i);
  window.scrollTo({top:0,behavior:'smooth'});
}

function nav(dir){
  const next=cur+dir;
  if(next>=0&&next<QS.length)irPara(next);
  else if(next>=QS.length)mostrarResultado();
}

function calcScores(){
  const dimPcts={};
  let totalPtsW=0,totalMaxW=0;
  DIMS.forEach(d=>{
    const resp=d.qs.filter(qi=>ans[qi]!==undefined);
    if(resp.length===0){dimPcts[d.id]=null;return;}
    const pts=resp.reduce((a,qi)=>a+ans[qi],0);
    const max=resp.length*3;
    dimPcts[d.id]=Math.round(pts/max*100);
    totalPtsW+=pts*(d.peso/100);
    totalMaxW+=max*(d.peso/100);
  });
  const total=totalMaxW>0?Math.round(totalPtsW/totalMaxW*100):0;
  return{dims:dimPcts,total};
}

function gerarInsights(scores){
  const comDados=DIMS.filter(d=>scores.dims[d.id]!==null);
  const ord=[...comDados].sort((a,b)=>scores.dims[a.id]-scores.dims[b.id]);
  const pior=ord[0];
  const melhor=ord[ord.length-1];
  const items=[];

  if(pior) items.push({ic:'↓',cor:'#e24b4a',txt:`<strong>${pior.label}</strong> é o maior gap da sua operação (${scores.dims[pior.id]}%). É onde a falta de maturidade mais impacta a experiência do cliente e a eficiência do negócio.`});

  if(ord[1]&&scores.dims[ord[1].id]<55) items.push({ic:'→',cor:'#ba7517',txt:`<strong>${ord[1].label}</strong> também merece atenção (${scores.dims[ord[1].id]}%). Costuma ser a segunda prioridade de evolução depois de tratar o gap principal.`});

  if(scores.dims['cultura']!==null&&scores.dims['cultura']<50) items.push({ic:'↓',cor:'#e24b4a',txt:'<strong>Cultura e times</strong> abaixo de 50% é um alerta importante. Tecnologia sem alinhamento de incentivos e governança raramente sustenta evolução omnichannel.'});

  if(scores.total<50) items.push({ic:'→',cor:'#ba7517',txt:'Em operações no estágio inicial, o maior risco é tentar evoluir vários pontos ao mesmo tempo. Concentrar esforço em uma ou duas dimensões gera resultado mais rápido e sustentável.'});

  if(melhor&&scores.dims[melhor.id]>=65) items.push({ic:'↑',cor:'#3b6d11',txt:`<strong>${melhor.label}</strong> é o ponto mais maduro da sua operação (${scores.dims[melhor.id]}%). Importante preservar esse nível enquanto as demais dimensões evoluem.`});

  if(scores.total>=70) items.push({ic:'↑',cor:'#3b6d11',txt:'Com score acima de 70%, a empresa já tem uma base omnichannel relevante. O próximo passo é identificar os últimos pontos de fricção e trabalhar otimização e escalabilidade.'});

  return items;
}

function mostrarResultado(){
  document.getElementById('stepQ').style.display='none';
  document.getElementById('stepRes').style.display='block';
  document.getElementById('enviando').style.display='block';
  document.getElementById('progFill').style.width='100%';
  document.getElementById('progPct').textContent='100%';
  document.getElementById('progLabel').textContent='Resultado';
  window.scrollTo({top:0,behavior:'smooth'});

  const scores=calcScores();
  const nivel=NIVEIS.find(n=>scores.total>=n.min&&scores.total<n.max)||NIVEIS[4];
  const insights=gerarInsights(scores);

  const payload={
    nome:cad.nome,email:cad.email,whatsapp:cad.whatsapp,
    empresa:cad.empresa,cargo:cad.cargo,
    scoreDados:scores.dims.dados??'',
    scoreJornada:scores.dims.jornada??'',
    scoreLogistica:scores.dims.logistica??'',
    scoreCultura:scores.dims.cultura??'',
    scoreCx:scores.dims.cx??'',
    scorePerformance:scores.dims.performance??'',
    scoreTotal:scores.total,
    nivel:nivel.label
  };

  const iframe=document.createElement('iframe');
  iframe.name='hid';iframe.style.display='none';
  document.body.appendChild(iframe);
  const form=document.createElement('form');
  form.method='POST';form.action=WEBHOOK;form.target='hid';form.style.display='none';
  Object.entries(payload).forEach(([k,v])=>{
    const inp=document.createElement('input');
    inp.type='hidden';inp.name=k;inp.value=v;form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();

  setTimeout(()=>{
    document.getElementById('enviando').style.display='none';
    document.getElementById('resConteudo').innerHTML=`
      <div class="score-hero">
        <div class="score-rotulo">Score geral de maturidade</div>
        <div class="score-num" style="color:${nivel.cor}">${scores.total}%</div>
        <div class="score-nivel" style="color:${nivel.cor}">${nivel.label}</div>
        <div class="score-desc">${nivel.desc}</div>
      </div>
      <div class="dims-grid">
        ${DIMS.map(d=>`
          <div class="dim-card">
            <div class="dim-card-nome">${d.label}</div>
            <div class="dim-card-val" style="color:${scores.dims[d.id]!==null?(scores.dims[d.id]>=65?'#3b6d11':scores.dims[d.id]>=40?'#ba7517':'#e24b4a'):'#bbb'}">${scores.dims[d.id]!==null?scores.dims[d.id]+'%':'—'}</div>
          </div>
        `).join('')}
      </div>
      <div class="insights">
        <h3>O que o seu resultado indica</h3>
        ${insights.map(it=>`
          <div class="ins-item">
            <div class="ins-ic" style="color:${it.cor};font-weight:700">${it.ic}</div>
            <div>${it.txt}</div>
          </div>
        `).join('')}
      </div>
      <div class="obrigado">
        <h3>Diagnóstico concluído</h3>
        <p>Obrigado por dedicar alguns minutos a esse diagnóstico.<br>Esperamos que o resultado traga uma visão clara de onde sua operação está e para onde faz sentido evoluir.</p>
      </div>
    `;
  },2000);
}
</script>
</body>
</html>
